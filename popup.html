<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>二维码识别助手</title>
    <style>
      :root {
        font-family: "Segoe UI", "PingFang SC", system-ui, sans-serif;
        color: #0f172a;
        background: #f4f6fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 360px;
        background: linear-gradient(180deg, #eff2ff, #fbfcff);
      }

      .app-shell {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .app-header h1 {
        font-size: 18px;
        margin: 0;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #475569;
        margin: 0 0 4px;
      }

      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 20px 35px rgba(15, 23, 42, 0.05);
        border: 1px solid rgba(15, 23, 42, 0.06);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .card-header small {
        font-size: 12px;
        color: #64748b;
      }

      .upload-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .ghost-btn,
      .primary-btn {
        border: none;
        border-radius: 999px;
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .ghost-btn {
        background: #eef2ff;
        color: #4338ca;
      }

      .ghost-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(67, 56, 202, 0.25);
      }

      .primary-btn {
        background: #0f62fe;
        color: #fff;
        box-shadow: 0 10px 18px rgba(15, 98, 254, 0.35);
      }

      .primary-btn:hover {
        transform: translateY(-1px);
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 12px;
        background: #e2e8f0;
        color: #0f172a;
        margin-top: 10px;
      }

      .status-chip[data-state="loading"] {
        background: #e0f2fe;
        color: #0369a1;
      }

      .status-chip[data-state="success"] {
        background: #dcfce7;
        color: #15803d;
      }

      .status-chip[data-state="error"] {
        background: #fee2e2;
        color: #b91c1c;
      }

      .status-chip[data-state="loading"]::before {
        content: "";
        width: 10px;
        height: 10px;
        border: 2px solid currentColor;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
        display: inline-block;
      }

      .result-list,
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 36px;
      }

      .result-card,
      .history-item {
        background: #f8fafc;
        border-radius: 12px;
        padding: 10px 14px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        font-size: 13px;
        word-break: break-word;
      }

      .result-card hr {
        margin: 10px 0;
        border: none;
        border-top: 1px dashed rgba(15, 23, 42, 0.2);
      }

      .result-card a,
      .history-item a {
        color: #0f62fe;
        text-decoration: none;
        font-weight: 600;
      }

      .result-empty {
        color: #475569;
        font-size: 13px;
      }

      .hint {
        font-size: 12px;
        color: #64748b;
      }

      .history-item small {
        display: block;
        color: #8b95a1;
        margin-top: 4px;
      }

      #capture-btn {
        min-width: 140px;
      }

      #status {
        transition: background 0.2s ease, color 0.2s ease;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">汤小猫抓二维码</p>
          <h1>纯本地二维码识别</h1>
        </div>
        <button id="capture-btn" class="primary-btn">截图识别</button>
      </header>

      <section class="card">
        <div class="card-header">
          <span>上传本地图片</span>
          <small>全程本地解析，安全且私密</small>
        </div>
        <div class="upload-row">
          <button id="upload-trigger" class="ghost-btn">选择图片</button>
          <span class="hint">支持 JPG / PNG / WebP，识别过程可能需要 1-2 秒。</span>
        </div>
        <input type="file" id="file" accept="image/*" hidden />
        <span id="status" class="status-chip" data-state="idle">等待识别</span>
      </section>

      <section class="card">
        <div class="card-header">
          <span>识别结果</span>
          <small>保持与侧边栏同步</small>
        </div>
        <div id="output" class="result-list">
          <div class="result-empty">尚未识别，请上传图片或截图。</div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <span>历史记录</span>
        </div>
        <div id="history" class="history-list"></div>
      </section>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
